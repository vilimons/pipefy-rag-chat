services:
  redis:
    image: redis/redis-stack:latest
    environment:
      REDIS_ARGS: "--save 60 1000 --appendonly yes --appendfsync everysec"
    container_name: pipefy-rag-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: pipefy-rag-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api

  api:
    build:
      context: ./backend
    container_name: pipefy-rag-api
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  redis_data:
